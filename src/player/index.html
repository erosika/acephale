<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Acephale Radio</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <header>
    <h1>ACEPHALE RADIO</h1>
    <p class="subtitle">headless transmission</p>
  </header>

  <main>
    <!-- Station Display -->
    <section class="station-display" id="station-display">
      <span class="tune-prompt">TUNE IN</span>
    </section>

    <!-- Frequency Band -->
    <section class="freq-band">
      <div class="freq-band-label">FREQUENCY</div>
      <div class="freq-band-stations" id="freq-stations"></div>
      <div class="freq-band-track" id="freq-track">
        <div class="tuning-indicator" id="tuning-indicator"></div>
      </div>
    </section>

    <!-- Controls: Tuning + Power + Volume -->
    <div class="controls-row">
      <div class="dial-wrap">
        <span class="dial-label">TUNING</span>
        <div class="tuning-dial" id="tuning-dial">
          <svg viewBox="0 0 100 100" width="140" height="140" id="tuning-svg"></svg>
        </div>
        <span class="dial-value" id="tuning-value"></span>
      </div>

      <div class="power-toggle-wrap">
        <div class="power-toggle">
          <span id="power-off-label" class="active">OFF</span>
          <input type="checkbox" class="power-switch" id="power-switch">
          <span id="power-on-label">ON</span>
        </div>
      </div>

      <div class="dial-wrap">
        <span class="dial-label">VOLUME</span>
        <div class="volume-dial" id="volume-dial">
          <svg viewBox="0 0 100 100" width="100" height="100" id="volume-svg"></svg>
        </div>
        <span class="dial-value" id="volume-value"></span>
      </div>
    </div>

    <!-- Utility row -->
    <div class="utility-row">
      <button id="call-in-btn" class="call-in-btn" title="Call in to the station">CALL IN</button>
    </div>

    <!-- History -->
    <section class="history" id="history">
      <h2>RECENTLY PLAYED</h2>
      <div class="history-entries" id="history-entries"></div>
    </section>

    <!-- Transcript -->
    <section class="transcript" id="transcript">
      <h2>LIVE TRANSCRIPT</h2>
      <div class="transcript-lines"></div>
    </section>
  </main>

  <footer>
    <span>Gemini + Honcho + Lyria + Radiooooo</span>
    <span>Google DeepMind Hackathon 2026</span>
  </footer>

  <!-- Unmute overlay -->
  <div id="unmute-overlay" class="unmute-overlay">
    <button id="unmute-btn" class="unmute-btn">TUNE IN</button>
  </div>

  <script>
    // ========================================================
    // STATIONS
    // ========================================================
    const STATIONS = [
      { id: 'morning-zoo',     mount: 'zoo',        pos: 15, name: 'Morning Zoo',      format: 'talk + pop' },
      { id: 'crate-digger',    mount: 'crate',      pos: 38, name: 'Crate Digger',     format: 'deep cuts' },
      { id: 'conspiracy-hour', mount: 'conspiracy',  pos: 62, name: 'Conspiracy Hour',  format: 'late-night talk' },
      { id: 'request-line',    mount: 'request',     pos: 85, name: 'Request Line',     format: 'listener-driven' },
    ];
    const LOCK_IN        = 4;   // distance to enter lock (display shows station)
    const LOCK_OUT       = 7;   // distance to leave lock (hysteresis band)
    const BLEND_RADIUS   = 15;  // stream audible within this distance

    // ========================================================
    // STATE
    // ========================================================
    let tuning = 50;
    let volume = 80;
    let isPowerOn = false;
    let lockedStation = null;
    let userHasInteracted = false;

    // Display state tracker -- only rebuild DOM when this changes
    let displayMode = 'off';  // 'off' | 'static' | station id string
    let rafPending = false;

    // Drag state -- incremental delta with wrap normalization
    let dragging = null;
    let prevAngle = 0;        // angle from previous frame (for incremental delta)
    let accumValue = 0;       // accumulated dial value during drag

    // Audio
    const streams = {};
    let audioCtx = null;
    let staticSource = null;
    let staticGain = null;

    // ========================================================
    // DOM
    // ========================================================
    const displayEl        = document.getElementById('station-display');
    const freqStationsEl   = document.getElementById('freq-stations');
    const freqTrackEl      = document.getElementById('freq-track');
    const tuningIndicator  = document.getElementById('tuning-indicator');
    const tuningDialEl     = document.getElementById('tuning-dial');
    const tuningSvg        = document.getElementById('tuning-svg');
    const tuningValueEl    = document.getElementById('tuning-value');
    const volumeDialEl     = document.getElementById('volume-dial');
    const volumeSvg        = document.getElementById('volume-svg');
    const volumeValueEl    = document.getElementById('volume-value');
    const powerSwitch      = document.getElementById('power-switch');
    const powerOffLabel    = document.getElementById('power-off-label');
    const powerOnLabel     = document.getElementById('power-on-label');
    const historyEntries   = document.getElementById('history-entries');
    const unmuteOverlay    = document.getElementById('unmute-overlay');
    const unmuteBtn        = document.getElementById('unmute-btn');
    const callBtn          = document.getElementById('call-in-btn');

    // ========================================================
    // SVG DIAL RENDERING
    // ========================================================
    function buildDialSVG(svg, opts) {
      const ns = 'http://www.w3.org/2000/svg';

      // Radial gradient for depth
      const defs = document.createElementNS(ns, 'defs');
      const grad = document.createElementNS(ns, 'radialGradient');
      grad.id = opts.groupId + '-grad';
      grad.setAttribute('cx', '45%'); grad.setAttribute('cy', '40%');
      grad.setAttribute('r', '55%');
      const stop1 = document.createElementNS(ns, 'stop');
      stop1.setAttribute('offset', '0%');
      stop1.setAttribute('stop-color', '#252a2e');
      const stop2 = document.createElementNS(ns, 'stop');
      stop2.setAttribute('offset', '100%');
      stop2.setAttribute('stop-color', '#111314');
      grad.appendChild(stop1);
      grad.appendChild(stop2);
      defs.appendChild(grad);
      svg.appendChild(defs);

      const outer = document.createElementNS(ns, 'circle');
      outer.setAttribute('cx', '50'); outer.setAttribute('cy', '50');
      outer.setAttribute('r', '48');
      outer.classList.add('dial-knob-ring');
      outer.setAttribute('fill', `url(#${opts.groupId}-grad)`);
      svg.appendChild(outer);

      const inner = document.createElementNS(ns, 'circle');
      inner.setAttribute('cx', '50'); inner.setAttribute('cy', '50');
      inner.setAttribute('r', '42');
      inner.classList.add('dial-knob-inner');
      svg.appendChild(inner);

      for (let i = 0; i < 24; i++) {
        const angle = (i / 24) * 360;
        const rad = (angle * Math.PI) / 180;
        const x1 = 50 + Math.cos(rad) * 44;
        const y1 = 50 + Math.sin(rad) * 44;
        const x2 = 50 + Math.cos(rad) * 48;
        const y2 = 50 + Math.sin(rad) * 48;
        const tick = document.createElementNS(ns, 'line');
        tick.setAttribute('x1', x1); tick.setAttribute('y1', y1);
        tick.setAttribute('x2', x2); tick.setAttribute('y2', y2);
        tick.classList.add('dial-tick');
        svg.appendChild(tick);
      }

      const g = document.createElementNS(ns, 'g');
      g.id = opts.groupId;
      const indicator = document.createElementNS(ns, 'line');
      indicator.setAttribute('x1', '50'); indicator.setAttribute('y1', '50');
      indicator.setAttribute('x2', '50'); indicator.setAttribute('y2', '12');
      indicator.classList.add('dial-indicator');
      g.appendChild(indicator);
      svg.appendChild(g);
    }

    function setDialRotation(groupId, value) {
      const deg = (value / 100) * 270 - 135;
      const g = document.getElementById(groupId);
      if (g) g.setAttribute('transform', `rotate(${deg} 50 50)`);
    }

    buildDialSVG(tuningSvg, { groupId: 'tuning-group' });
    buildDialSVG(volumeSvg, { groupId: 'volume-group' });

    // ========================================================
    // FREQUENCY BAND
    // ========================================================
    function buildFreqBand() {
      STATIONS.forEach(s => {
        const label = document.createElement('span');
        label.className = 'station-label';
        label.textContent = s.name;
        label.style.left = s.pos + '%';
        label.dataset.stationId = s.id;
        freqStationsEl.appendChild(label);
      });
      STATIONS.forEach(s => {
        const marker = document.createElement('div');
        marker.className = 'station-marker';
        marker.style.left = s.pos + '%';
        freqTrackEl.insertBefore(marker, tuningIndicator);
      });
    }
    buildFreqBand();

    // ========================================================
    // STREAMS
    // ========================================================
    function streamUrl(mount) {
      // Use same-origin proxy to avoid cross-origin issues
      return `/stream/${mount}`;
    }

    function initStreams() {
      STATIONS.forEach(s => {
        if (streams[s.mount]) return;
        const a = new Audio(streamUrl(s.mount));
        a.volume = 0;
        a.preload = 'none';
        streams[s.mount] = a;
        console.log(`[radio] created stream: ${s.mount}`);

        a.addEventListener('error', (e) => {
          const code = a.error ? a.error.code : '?';
          const msg = a.error ? a.error.message : 'unknown';
          console.error(`[radio] ${s.mount} stream error (code=${code}): ${msg}, reconnecting in 5s`);
          setTimeout(() => {
            a.src = streamUrl(s.mount);
            a.load();
            if (userHasInteracted) a.play().then(() => {
              console.log(`[radio] ${s.mount} reconnected`);
            }).catch(err => {
              console.error(`[radio] ${s.mount} reconnect play failed:`, err.message);
            });
          }, 5000);
        });
      });
    }

    function startAllStreams() {
      for (const [mount, a] of Object.entries(streams)) {
        a.play().then(() => {
          console.log(`[radio] ${mount} stream playing`);
        }).catch(err => {
          console.error(`[radio] ${mount} stream play failed:`, err.message);
        });
      }
      console.log('[radio] all streams started');
      computeStreamVolumes();
    }

    // ========================================================
    // PROXIMITY-BASED VOLUME BLENDING
    // ========================================================
    function computeStreamVolumes() {
      const master = volume / 100;
      if (!isPowerOn) {
        for (const a of Object.values(streams)) a.volume = 0;
        return;
      }

      for (const s of STATIONS) {
        const a = streams[s.mount];
        if (!a) continue;
        const dist = Math.abs(tuning - s.pos);

        let streamVol;
        if (dist <= LOCK_IN) {
          // Dead-on: full volume
          streamVol = master;
        } else if (dist <= BLEND_RADIUS) {
          // Blend zone: linear fade from 1 at lock edge to 0 at blend edge
          const t = (BLEND_RADIUS - dist) / (BLEND_RADIUS - LOCK_IN);
          streamVol = t * master;
        } else {
          streamVol = 0;
        }
        a.volume = streamVol;
      }
    }

    // ========================================================
    // STATIC NOISE ENGINE
    // ========================================================
    function initAudioContext() {
      if (audioCtx) return;
      audioCtx = new (window.AudioContext || window.webkitAudioContext)();
      console.log('[radio] AudioContext created, sampleRate:', audioCtx.sampleRate);

      const bufferSize = audioCtx.sampleRate * 2;
      const buffer = audioCtx.createBuffer(1, bufferSize, audioCtx.sampleRate);
      const data = buffer.getChannelData(0);
      for (let i = 0; i < bufferSize; i++) {
        data[i] = Math.random() * 2 - 1;
      }

      staticSource = audioCtx.createBufferSource();
      staticSource.buffer = buffer;
      staticSource.loop = true;

      staticGain = audioCtx.createGain();
      staticGain.gain.value = 0;

      staticSource.connect(staticGain);
      staticGain.connect(audioCtx.destination);
      staticSource.start();
      console.log('[radio] static noise engine running');
    }

    function updateStaticGain() {
      if (!staticGain || !audioCtx) return;

      if (!isPowerOn) {
        staticGain.gain.linearRampToValueAtTime(0, audioCtx.currentTime + 0.1);
        return;
      }

      let minDist = Infinity;
      for (const s of STATIONS) {
        const d = Math.abs(tuning - s.pos);
        if (d < minDist) minDist = d;
      }

      let staticLevel;
      if (minDist <= LOCK_IN) {
        staticLevel = 0;
      } else {
        staticLevel = Math.min((minDist - LOCK_IN) / 20, 1);
      }

      const targetGain = staticLevel * (volume / 100) * 0.08;
      staticGain.gain.linearRampToValueAtTime(targetGain, audioCtx.currentTime + 0.1);
    }

    // ========================================================
    // STATION LOCKING (display only -- audio uses blend)
    // Hysteresis: lock at LOCK_IN, unlock at LOCK_OUT
    // ========================================================
    function findLockedStation() {
      // If already locked, use wider LOCK_OUT band to prevent flutter
      if (lockedStation) {
        const dist = Math.abs(tuning - lockedStation.pos);
        if (dist <= LOCK_OUT) return lockedStation;
      }
      // Otherwise, need to be within tight LOCK_IN to acquire lock
      for (const s of STATIONS) {
        if (Math.abs(tuning - s.pos) <= LOCK_IN) return s;
      }
      return null;
    }

    // ========================================================
    // DISPLAY -- only rebuilds DOM when display state changes
    // ========================================================
    function rebuildDisplay() {
      if (!isPowerOn) {
        displayEl.innerHTML = '<div class="tune-prompt">TUNE IN</div>';
        return;
      }
      if (lockedStation) {
        displayEl.innerHTML =
          `<div class="display-status on-air">ON AIR</div>` +
          `<div class="display-name">${lockedStation.name.toUpperCase()}</div>` +
          `<div class="display-format">${lockedStation.format}</div>` +
          `<div class="display-track" id="display-track"></div>`;
      } else {
        displayEl.innerHTML = '<div class="static-indicator">STATIC</div>';
      }
    }

    function updateFreqLabels() {
      freqStationsEl.querySelectorAll('.station-label').forEach(el => {
        el.classList.toggle('active', lockedStation && el.dataset.stationId === lockedStation.id);
      });
    }

    // ========================================================
    // UNIFIED UPDATE -- called on every tuning/volume change
    // Separates cheap per-frame work from expensive DOM rebuilds
    // ========================================================
    function updateTuningFrame() {
      // Cheap: dial rotation + freq indicator position
      setDialRotation('tuning-group', tuning);
      tuningValueEl.textContent = `[${Math.round(tuning)}]`;
      tuningIndicator.style.left = tuning + '%';

      // Cheap: audio levels (smooth, no DOM)
      computeStreamVolumes();
      updateStaticGain();

      // Check if display state actually changed
      const nearest = findLockedStation();
      const newMode = !isPowerOn ? 'off' : nearest ? nearest.id : 'static';

      tuningIndicator.classList.toggle('locked', !!nearest);

      if (newMode !== displayMode) {
        const prevMode = displayMode;
        displayMode = newMode;
        lockedStation = nearest;
        console.log(`[radio] display: ${prevMode} -> ${newMode}`,
          nearest ? `(${nearest.name})` : '',
          `tuning=${tuning.toFixed(1)}`);
        rebuildDisplay();
        updateFreqLabels();

        if (nearest) {
          fetchNowPlaying();
          fetchHistory();
        }
      } else {
        lockedStation = nearest;
      }
    }

    function updateVolumeFrame() {
      setDialRotation('volume-group', volume);
      volumeValueEl.textContent = `[${Math.round(volume)}]`;
      computeStreamVolumes();
      updateStaticGain();
    }

    // ========================================================
    // DIAL INTERACTION
    // Incremental delta with atan2 wrap normalization.
    // Distance-based sensitivity: further from center = finer control.
    // Dead zone near center prevents wild swings.
    // Per-frame delta capped to prevent jumps.
    // ========================================================
    let dialCenterX = 0;
    let dialCenterY = 0;
    let dialRadius = 0;
    let dragMoved = false;  // track if drag moved enough to suppress click

    const DEAD_ZONE   = 12;   // px -- ignore movement within this radius
    const SENSITIVITY  = 0.7;  // overall sensitivity multiplier
    const MAX_DELTA    = 6;    // max value change per frame

    function cacheDialCenter(el) {
      const rect = el.getBoundingClientRect();
      dialCenterX = rect.left + rect.width / 2;
      dialCenterY = rect.top + rect.height / 2;
      dialRadius = rect.width / 2;
    }

    function getPointerInfo(e) {
      const clientX = e.touches ? e.touches[0].clientX : e.clientX;
      const clientY = e.touches ? e.touches[0].clientY : e.clientY;
      const dx = clientX - dialCenterX;
      const dy = clientY - dialCenterY;
      const dist = Math.sqrt(dx * dx + dy * dy);
      const angle = Math.atan2(dy, dx);
      return { angle, dist };
    }

    function handleDialStart(which, el, e) {
      if (!isPowerOn && which === 'tuning') return;
      e.preventDefault();
      e.stopPropagation();
      dragging = which;
      dragMoved = false;
      cacheDialCenter(el);
      const info = getPointerInfo(e);
      prevAngle = info.angle;
      accumValue = which === 'tuning' ? tuning : volume;
    }

    tuningDialEl.addEventListener('mousedown', e => handleDialStart('tuning', tuningDialEl, e));
    tuningDialEl.addEventListener('touchstart', e => handleDialStart('tuning', tuningDialEl, e), { passive: false });
    volumeDialEl.addEventListener('mousedown', e => handleDialStart('volume', volumeDialEl, e));
    volumeDialEl.addEventListener('touchstart', e => handleDialStart('volume', volumeDialEl, e), { passive: false });

    // Click-to-tune: click on the tuning dial to jump to nearest station
    // Only fires if no meaningful drag occurred (dragMoved stays false)
    tuningDialEl.addEventListener('click', e => {
      if (!isPowerOn || dragMoved) return;
      cacheDialCenter(tuningDialEl);
      const { angle } = getPointerInfo(e);
      // Map angle to value: -135deg = 0, +135deg = 100
      let deg = (angle * 180 / Math.PI) + 90;
      if (deg < 0) deg += 360;
      if (deg > 315) deg -= 360;
      const value = Math.max(0, Math.min(100, ((deg + 45) / 270) * 100));

      let nearest = STATIONS[0];
      let minDist = Infinity;
      for (const s of STATIONS) {
        const d = Math.abs(value - s.pos);
        if (d < minDist) { minDist = d; nearest = s; }
      }
      tuning = nearest.pos;
      accumValue = tuning;
      displayMode = '__force__';
      updateTuningFrame();
    });

    function handleMove(e) {
      if (!dragging) return;
      e.preventDefault();

      const { angle, dist } = getPointerInfo(e);

      // Dead zone: ignore when cursor is very near dial center
      if (dist < DEAD_ZONE) {
        prevAngle = angle;
        return;
      }

      // Incremental delta, normalized to [-PI, PI]
      let delta = angle - prevAngle;
      if (delta > Math.PI) delta -= 2 * Math.PI;
      if (delta < -Math.PI) delta += 2 * Math.PI;
      prevAngle = angle;

      // Distance-based sensitivity: further from center = finer control
      // At the edge (dist == radius), sensitivity is 1x.
      // Closer to center, sensitivity increases (but dead zone catches the extreme).
      const distFactor = Math.min(dist / (dialRadius * 0.6), 1.5);
      const scaledDelta = delta * SENSITIVITY * distFactor;

      let deltaValue = (scaledDelta / (Math.PI * 2)) * 100;

      // Cap per-frame delta to prevent jumps
      deltaValue = Math.max(-MAX_DELTA, Math.min(MAX_DELTA, deltaValue));

      accumValue = Math.max(0, Math.min(100, accumValue + deltaValue));

      // Mark drag as moved if value changed meaningfully
      if (Math.abs(deltaValue) > 0.3) dragMoved = true;

      if (dragging === 'tuning') {
        tuning = accumValue;
      } else {
        volume = accumValue;
      }

      // Batch to next animation frame
      if (!rafPending) {
        rafPending = true;
        const which = dragging;
        requestAnimationFrame(() => {
          rafPending = false;
          if (which === 'tuning') updateTuningFrame();
          else updateVolumeFrame();
        });
      }
    }

    function handleEnd() {
      if (!dragging) return;
      const which = dragging;
      dragging = null;
      document.body.style.overflow = '';
      document.body.style.userSelect = '';

      if (which === 'tuning') updateTuningFrame();
      else updateVolumeFrame();
    }

    document.addEventListener('mousemove', handleMove, { passive: false });
    document.addEventListener('mouseup', handleEnd);
    document.addEventListener('touchmove', e => {
      if (dragging) {
        document.body.style.overflow = 'hidden';
        document.body.style.userSelect = 'none';
      }
      handleMove(e);
    }, { passive: false });
    document.addEventListener('touchend', handleEnd);

    // ========================================================
    // POWER TOGGLE
    // ========================================================
    powerSwitch.addEventListener('change', () => {
      isPowerOn = powerSwitch.checked;
      console.log(`[radio] power: ${isPowerOn ? 'ON' : 'OFF'}`);
      powerOffLabel.classList.toggle('active', !isPowerOn);
      powerOnLabel.classList.toggle('active', isPowerOn);
      displayMode = '__force__'; // force display rebuild
      updateTuningFrame();
    });

    // ========================================================
    // UNMUTE OVERLAY
    // ========================================================
    unmuteBtn.addEventListener('click', () => {
      userHasInteracted = true;
      unmuteOverlay.classList.add('hidden');
      initAudioContext();
      initStreams();
      startAllStreams();

      isPowerOn = true;
      powerSwitch.checked = true;
      powerOffLabel.classList.remove('active');
      powerOnLabel.classList.add('active');
      tuning = STATIONS[0].pos;
      console.log(`[radio] TUNE IN -> power on, tuning to ${STATIONS[0].name} (pos ${STATIONS[0].pos})`);

      setDialRotation('volume-group', volume);
      volumeValueEl.textContent = `[${Math.round(volume)}]`;
      displayMode = '__force__';
      updateTuningFrame();
    });

    // ========================================================
    // NOW-PLAYING & HISTORY POLLING
    // ========================================================
    setInterval(() => {
      if (lockedStation) {
        fetchNowPlaying();
        fetchHistory();
      }
    }, 8000);

    async function fetchNowPlaying() {
      if (!lockedStation) return;
      try {
        const res = await fetch(`/stations/${lockedStation.id}/now-playing`);
        const data = await res.json();
        const trackEl = document.getElementById('display-track');
        if (trackEl && data.title) {
          let info = data.title;
          if (data.artist) info += ` \u2014 ${data.artist}`;
          if (data.year) info += ` (${data.year})`;
          if (data.country) info += ` [${data.country}]`;
          trackEl.textContent = info;
        }
      } catch {}
    }

    async function fetchHistory() {
      if (!lockedStation) return;
      try {
        const res = await fetch(`/stations/${lockedStation.id}/history?limit=10`);
        const entries = await res.json();
        if (!Array.isArray(entries) || entries.length === 0) {
          historyEntries.innerHTML = '<div class="history-empty">No tracks yet</div>';
          return;
        }
        historyEntries.innerHTML = entries.map(e => {
          const time = new Date(e.timestamp).toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
          return `<div class="history-row">
            <span class="history-time">${time}</span>
            <span class="history-track">${e.title || 'Unknown'} \u2014 ${e.artist || '?'}</span>
            <span class="history-meta">${e.year || ''} ${e.country || ''}</span>
          </div>`;
        }).join('');
      } catch {
        historyEntries.innerHTML = '';
      }
    }

    // ========================================================
    // VOICE CALL-IN (WebSocket)
    // ========================================================
    let mediaRecorder = null;
    let callWs = null;

    callBtn.addEventListener('click', async () => {
      if (mediaRecorder && mediaRecorder.state === 'recording') {
        mediaRecorder.stop();
        callBtn.classList.remove('recording');
        callBtn.textContent = 'CALL IN';
        return;
      }

      if (!lockedStation) return;

      try {
        const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
        callWs = new WebSocket(`ws://${location.host}/ws/call`);

        callWs.onopen = () => {
          callWs.send(JSON.stringify({ station: lockedStation.id }));

          mediaRecorder = new MediaRecorder(stream, { mimeType: 'audio/webm' });

          mediaRecorder.ondataavailable = (e) => {
            if (e.data.size > 0 && callWs.readyState === WebSocket.OPEN) {
              callWs.send(e.data);
            }
          };

          mediaRecorder.onstop = () => {
            stream.getTracks().forEach(t => t.stop());
            setTimeout(() => {
              if (callWs.readyState === WebSocket.OPEN) callWs.close();
            }, 500);
          };

          mediaRecorder.start(250);
          callBtn.classList.add('recording');
          callBtn.textContent = 'RECORDING...';
        };

        callWs.onerror = () => {
          if (mediaRecorder) mediaRecorder.stop();
          callBtn.classList.remove('recording');
          callBtn.textContent = 'CALL IN';
        };

      } catch (err) {
        console.error('Failed to access microphone', err);
      }
    });

    // ========================================================
    // BOOT
    // ========================================================
    initStreams();
    setDialRotation('tuning-group', tuning);
    setDialRotation('volume-group', volume);
    tuningValueEl.textContent = `[${Math.round(tuning)}]`;
    volumeValueEl.textContent = `[${Math.round(volume)}]`;
    displayMode = '__force__';
    updateTuningFrame();
    unmuteOverlay.classList.remove('hidden');
    console.log('[radio] boot complete');
  </script>
</body>
</html>
