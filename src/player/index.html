<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Acephale Radio</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <header>
    <h1>ACEPHALE RADIO</h1>
    <p class="subtitle">headless transmission</p>
  </header>

  <main>
    <section class="dial-container">
      <div class="dial-label">STATION</div>
      <nav class="dial">
        <button class="station" data-station="morning-zoo" data-mount="zoo">
          <span class="station-id">1</span>
          <span class="station-name">Morning Zoo</span>
          <span class="station-format">talk + pop</span>
        </button>
        <span class="dial-gap">///</span>
        <button class="station active" data-station="crate-digger" data-mount="crate">
          <span class="station-id">2</span>
          <span class="station-name">Crate Digger</span>
          <span class="station-format">deep cuts</span>
        </button>
        <span class="dial-gap">///</span>
        <button class="station" data-station="conspiracy-hour" data-mount="conspiracy">
          <span class="station-id">3</span>
          <span class="station-name">Conspiracy Hour</span>
          <span class="station-format">late-night talk</span>
        </button>
        <span class="dial-gap">///</span>
        <button class="station" data-station="request-line" data-mount="request">
          <span class="station-id">4</span>
          <span class="station-name">Request Line</span>
          <span class="station-format">listener-driven</span>
        </button>
      </nav>
    </section>

    <section class="player">
      <div class="now-playing">
        <span class="status-dot live"></span>
        <span class="status-text">TUNING IN...</span>
      </div>
      <div class="track-info" id="track-info"></div>
      <div class="controls">
        <input type="range" id="volume" min="0" max="100" value="80">
        <button id="call-in-btn" class="call-in-btn" title="Call in to the station">🎙️ CALL IN</button>
      </div>
    </section>

    <section class="history" id="history">
      <h2>RECENTLY PLAYED</h2>
      <div class="history-entries" id="history-entries"></div>
    </section>

    <section class="transcript" id="transcript">
      <h2>LIVE TRANSCRIPT</h2>
      <div class="transcript-lines"></div>
    </section>
  </main>

  <footer>
    <span>Gemini + Honcho + Lyria + Radiooooo</span>
    <span>Google DeepMind Hackathon 2026</span>
  </footer>

  <!-- Unmute overlay -- browsers block autoplay until user gesture -->
  <div id="unmute-overlay" class="unmute-overlay">
    <button id="unmute-btn" class="unmute-btn">TUNE IN</button>
  </div>

  <script>
    // --- All streams stay alive, switching just mutes/unmutes ---
    const MOUNTS = { 'morning-zoo': 'zoo', 'crate-digger': 'crate', 'conspiracy-hour': 'conspiracy', 'request-line': 'request' };
    const streams = {};  // mount -> Audio
    let currentStation = 'crate-digger';
    let currentMount = 'crate';
    let userHasInteracted = false;

    const volumeSlider = document.getElementById('volume');
    const statusText = document.querySelector('.status-text');
    const trackInfo = document.getElementById('track-info');
    const historyEntries = document.getElementById('history-entries');
    const stationBtns = document.querySelectorAll('.station');
    const unmuteOverlay = document.getElementById('unmute-overlay');
    const unmuteBtn = document.getElementById('unmute-btn');

    function streamUrl(mount) {
      return `http://${location.hostname}:8000/${mount}`;
    }

    // Create and start all 4 streams (muted except active)
    function initStreams() {
      for (const [station, mount] of Object.entries(MOUNTS)) {
        if (streams[mount]) continue;
        const a = new Audio(streamUrl(mount));
        a.volume = 0;
        a.preload = 'none';
        streams[mount] = a;

        a.addEventListener('error', () => {
          console.error(`[radio] ${mount} stream error, reconnecting...`);
          setTimeout(() => {
            a.src = streamUrl(mount);
            a.load();
            if (userHasInteracted) a.play().catch(() => {});
          }, 5000);
        });
      }
    }

    function startAll() {
      const vol = volumeSlider.value / 100;
      for (const [mount, a] of Object.entries(streams)) {
        a.volume = mount === currentMount ? vol : 0;
        a.play().catch(() => {});
      }
    }

    function tuneIn(mount) {
      const vol = volumeSlider.value / 100;
      currentMount = mount;

      // Instant switch: unmute target, mute others
      for (const [m, a] of Object.entries(streams)) {
        a.volume = m === mount ? vol : 0;
      }

      const active = streams[mount];
      if (active) {
        const name = document.querySelector('.station.active .station-name')?.textContent || mount;
        if (active.readyState >= 2) {
          statusText.textContent = `ON AIR \u2014 ${name.toUpperCase()}`;
        } else {
          statusText.textContent = 'BUFFERING...';
          active.addEventListener('playing', () => {
            if (currentMount === mount) {
              statusText.textContent = `ON AIR \u2014 ${name.toUpperCase()}`;
            }
          }, { once: true });
        }
      }
    }

    // Unmute overlay
    unmuteBtn.addEventListener('click', () => {
      userHasInteracted = true;
      unmuteOverlay.classList.add('hidden');
      initStreams();
      startAll();
      tuneIn(currentMount);
    });

    // Station switching -- instant, no teardown
    stationBtns.forEach(btn => {
      btn.addEventListener('click', () => {
        currentStation = btn.dataset.station;
        stationBtns.forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        tuneIn(btn.dataset.mount);
        fetchHistory();
        fetchNowPlaying();
      });
    });

    // Volume
    volumeSlider.addEventListener('input', () => {
      const vol = volumeSlider.value / 100;
      const active = streams[currentMount];
      if (active) active.volume = vol;
    });

    // Now-playing polling
    setInterval(() => {
      fetchNowPlaying();
      fetchHistory();
    }, 8000);

    async function fetchNowPlaying() {
      try {
        const res = await fetch(`/stations/${currentStation}/now-playing`);
        const data = await res.json();
        if (data.title) {
          let info = data.title;
          if (data.artist) info += ` \u2014 ${data.artist}`;
          if (data.year) info += ` (${data.year})`;
          if (data.country) info += ` [${data.country}]`;
          trackInfo.textContent = info;
        } else {
          trackInfo.textContent = '';
        }
      } catch {}
    }

    async function fetchHistory() {
      try {
        const res = await fetch(`/stations/${currentStation}/history?limit=10`);
        const entries = await res.json();
        if (!Array.isArray(entries) || entries.length === 0) {
          historyEntries.innerHTML = '<div class="history-empty">No tracks yet</div>';
          return;
        }
        historyEntries.innerHTML = entries.map(e => {
          const time = new Date(e.timestamp).toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
          return `<div class="history-row">
            <span class="history-time">${time}</span>
            <span class="history-track">${e.title || 'Unknown'} \u2014 ${e.artist || '?'}</span>
            <span class="history-meta">${e.year || ''} ${e.country || ''}</span>
          </div>`;
        }).join('');
      } catch {
        historyEntries.innerHTML = '';
      }
    }

    // Boot
    initStreams();
    fetchNowPlaying();
    fetchHistory();
    unmuteOverlay.classList.remove('hidden');

    // --- Voice Calling via WebSocket ---
    const callBtn = document.getElementById('call-in-btn');
    let mediaRecorder = null;
    let callWs = null;

    callBtn.addEventListener('click', async () => {
      if (mediaRecorder && mediaRecorder.state === 'recording') {
        // Stop recording
        mediaRecorder.stop();
        callBtn.classList.remove('recording');
        callBtn.textContent = '🎙️ CALL IN';
        return;
      }

      // Start recording
      try {
        const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
        
        callWs = new WebSocket(`ws://${location.host}/ws/call`);
        
        callWs.onopen = () => {
          callWs.send(JSON.stringify({ station: currentStation }));
          
          mediaRecorder = new MediaRecorder(stream, { mimeType: 'audio/webm' });
          
          mediaRecorder.ondataavailable = (e) => {
            if (e.data.size > 0 && callWs.readyState === WebSocket.OPEN) {
              callWs.send(e.data);
            }
          };
          
          mediaRecorder.onstop = () => {
            stream.getTracks().forEach(t => t.stop());
            setTimeout(() => {
              if (callWs.readyState === WebSocket.OPEN) {
                callWs.close();
              }
            }, 500); // Wait for final chunks
          };
          
          mediaRecorder.start(250);
          callBtn.classList.add('recording');
          callBtn.textContent = '🔴 RECORDING...';
        };

        callWs.onerror = (e) => {
          console.error('Call WebSocket error', e);
          if (mediaRecorder) mediaRecorder.stop();
          callBtn.classList.remove('recording');
          callBtn.textContent = '🎙️ CALL IN';
        };

      } catch (err) {
        console.error('Failed to access microphone', err);
        alert('Could not access microphone.');
      }
    });

  </script>
</body>
</html>
